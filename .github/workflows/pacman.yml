name: Generate Pacman Contribution

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Generate pacman-contribution-graph
        uses: abozanona/pacman-contribution-graph@v1
        with:
          github_user_name: fabianf4
          outputs: dist/pacman-contribution-graph.svg

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          keep_files: true
          force_orphan: false
